services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dex
      POSTGRES_PASSWORD: dexpass
      POSTGRES_DB: dexdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dex -d dexdb"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pgdata: